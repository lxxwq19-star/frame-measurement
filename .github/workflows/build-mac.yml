name: Build Mac Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Mac app
        run: npm run build -- --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: frame-measurement-mac
          path: dist/*.dmg
          if-no-files-found: warn        # ← 新增这行
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # ← 新增这个env块
