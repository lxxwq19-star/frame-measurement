name: Build Mac Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Mac app
        run: npm run build -- --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG to Release
        run: |
          gh release upload ${{ github.ref_name }} dist/*.dmg --clobber || true
          # If no tag exists, create one
          gh release create v1.4.0 dist/*.dmg --title "Mac v1.4.0" --generate-notes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
